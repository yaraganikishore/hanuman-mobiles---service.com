<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanuman Mobiles & Service Center</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(180deg,#eef6fc 0%, #f9fcff 100%);
color:#243746;
}

.container{
width:min(1200px,92%);
margin:auto;
}

.navbar{
position:sticky;
top:0;
z-index:1000;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
border-bottom:1px solid #dbe7f0;
box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

.nav-wrap{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 0;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:28px;
font-weight:800;
color:#0d6efd;
}

.logo span{
color:#ff9800;
}

.nav-logo{
width:42px;
height:42px;
object-fit:contain;
}

.nav-links{
display:flex;
list-style:none;
gap:24px;
}

.nav-links a{
color:#243746;
font-weight:700;
text-decoration:none;
}

.nav-links a:hover{
color:#0d6efd;
}

.hero{
padding:60px 0;
}

.hero-box{
background:linear-gradient(135deg,#0d6fb4 0%, #0a77c6 50%, #0f6cad 100%);
border-radius:32px;
padding:48px;
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:30px;
color:#fff;
}

.hero-content h1{
font-size:48px;
margin-bottom:10px;
}

.hero-content p{
font-size:18px;
margin-bottom:20px;
}

.hero-image img{
width:100%;
max-height:400px;
object-fit:contain;
}

footer{
background:#0d6aa8;
color:#fff;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">
<div class="container nav-wrap">

<a href="#" class="logo">
<img src="images/hanuman-logo.png" class="nav-logo">
Hanuman <span>Mobiles</span>
</a>

<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">Brands</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Repairs</a></li>
<li><a href="#">Contact</a></li>
</ul>

</div>
</nav>

<!-- HERO -->

<section class="hero">

<div class="container">

<div class="hero-box">

<div class="hero-content">
<h1>Hanuman Mobiles & Service Center</h1>
<p>
Trusted mobile repair service. Display replacement, battery change,
software support and all smartphone repairs.
</p>
</div>

<div class="hero-image">
<img src="images/hanuman-logo.png">
</div>

</div>

</div>

</section>

<footer>
© 2026 Hanuman Mobiles & Service Center
</footer>

</body>
</html>
